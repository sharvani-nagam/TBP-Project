<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Optiplus — Select Language</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=Manrope:wght@400;500;600;700;800&display=swap"
    rel="stylesheet" />
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --primary: #2563eb;
      --primary-light: #3b82f6;
      --bg: #f5f7fb;
      --bg-card: #ffffff;
      --text: #1e293b;
      --text-secondary: #475569;
      --text-muted: #94a3b8;
      --border: #e2e8f0;
      --shadow-sm: 0 1px 3px rgba(0, 0, 0, 0.06);
      --shadow-md: 0 4px 12px rgba(0, 0, 0, 0.07);
      --shadow-lg: 0 8px 24px rgba(0, 0, 0, 0.08);
      --radius: 14px;
      --radius-sm: 10px;
      --radius-xl: 18px;
    }

    html,
    body {
      min-height: 100vh;
      font-family: 'DM Sans', -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      background: radial-gradient(ellipse at 20% 10%, rgba(37, 99, 235, 0.04) 0%, transparent 50%),
        radial-gradient(ellipse at 80% 90%, rgba(14, 165, 233, 0.03) 0%, transparent 50%);
    }

    .page {
      position: relative;
      z-index: 1;
      max-width: 820px;
      margin: 0 auto;
      padding: 40px 24px;
    }

    .header {
      text-align: center;
      margin-bottom: 40px;
    }

    .brand-icon {
      width: 56px;
      height: 56px;
      border-radius: var(--radius);
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      color: #fff;
      margin-bottom: 16px;
      box-shadow: 0 0 20px rgba(37, 99, 235, 0.2);
    }

    .header h1 {
      font-family: 'Manrope', sans-serif;
      font-size: 28px;
      font-weight: 800;
      color: var(--text);
      margin-bottom: 8px;
    }

    .header p {
      font-size: 15px;
      color: var(--text-secondary);
      max-width: 420px;
      margin: 0 auto;
      line-height: 1.6;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 14px;
      margin-bottom: 36px;
    }

    .lang-card {
      background: var(--bg-card);
      border: 2px solid var(--border);
      border-radius: var(--radius-xl);
      padding: 20px 18px;
      cursor: pointer;
      transition: all 0.25s ease;
      position: relative;
      display: flex;
      align-items: center;
      gap: 14px;
      box-shadow: var(--shadow-sm);
    }

    .lang-card:hover {
      border-color: var(--primary-light);
      transform: translateY(-3px);
      box-shadow: var(--shadow-lg), 0 0 20px rgba(37, 99, 235, 0.08);
    }

    .lang-card.selected {
      border-color: var(--primary);
      background: linear-gradient(135deg, rgba(37, 99, 235, 0.04), rgba(14, 165, 233, 0.03));
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.12), var(--shadow-md);
    }

    .lang-card.selected .check-mark {
      opacity: 1;
      transform: scale(1);
    }

    .lang-icon {
      width: 44px;
      height: 44px;
      border-radius: 12px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      background: linear-gradient(135deg, #eef2ff, #e0e7ff);
    }

    .lang-info {
      flex: 1;
      min-width: 0;
    }

    .lang-name {
      font-size: 15px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 2px;
    }

    .lang-native {
      font-size: 13px;
      color: var(--text-secondary);
    }

    .lang-code {
      font-size: 10px;
      color: var(--text-muted);
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-top: 2px;
    }

    .check-mark {
      position: absolute;
      top: 10px;
      right: 10px;
      width: 24px;
      height: 24px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-size: 13px;
      font-weight: 700;
      opacity: 0;
      transform: scale(0.5);
      transition: all 0.25s ease;
    }

    .continue-section {
      text-align: center;
    }

    .btn-continue {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 16px 48px;
      border: none;
      border-radius: var(--radius);
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      color: #fff;
      font-size: 16px;
      font-weight: 700;
      font-family: inherit;
      cursor: pointer;
      transition: all 0.25s ease;
      box-shadow: 0 4px 16px rgba(37, 99, 235, 0.3);
    }

    .btn-continue:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 24px rgba(37, 99, 235, 0.35);
    }

    .btn-continue:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }

    .footer-note {
      text-align: center;
      margin-top: 28px;
      font-size: 12px;
      color: var(--text-muted);
      line-height: 1.6;
    }

    @media (max-width: 520px) {
      .grid {
        grid-template-columns: 1fr;
      }

      .header h1 {
        font-size: 22px;
      }
    }
  </style>
</head>

<body>
  <div class="page">
    <div class="header">
      <div class="brand-icon">👁</div>
      <h1>Select Your Language</h1>
      <p>Choose the language for voice instructions and on-screen guidance during your vision screening.</p>
    </div>
    <div class="grid" id="langGrid"></div>
    <div class="continue-section">
      <button class="btn-continue" id="continueBtn" disabled>
        Continue to Eye Test →
      </button>
    </div>
    <div class="footer-note">
      ⚕ Voice synthesis quality depends on your browser and device language packs.<br>
      For best results, ensure your device has the selected language's text-to-speech pack installed.
    </div>
  </div>
  <script>
    const LANGUAGES = [
      { code: 'en-IN', name: 'English', native: 'English', icon: '🇮🇳' },
      { code: 'hi-IN', name: 'Hindi', native: 'हिन्दी', icon: '🇮🇳' },
      { code: 'te-IN', name: 'Telugu', native: 'తెలుగు', icon: '🇮🇳' },
      { code: 'ta-IN', name: 'Tamil', native: 'தமிழ்', icon: '🇮🇳' },
      { code: 'bn-IN', name: 'Bengali', native: 'বাংলা', icon: '🇮🇳' },
      { code: 'mr-IN', name: 'Marathi', native: 'मराठी', icon: '🇮🇳' },
    ];
    const grid = document.getElementById('langGrid');
    const continueBtn = document.getElementById('continueBtn');
    let selected = localStorage.getItem('optiplus_lang') || null;

    function render() {
      grid.innerHTML = '';
      LANGUAGES.forEach(lang => {
        const card = document.createElement('div');
        card.className = 'lang-card' + (selected === lang.code ? ' selected' : '');
        card.innerHTML = `
        <div class="lang-icon">${lang.icon}</div>
        <div class="lang-info">
          <div class="lang-name">${lang.name}</div>
          <div class="lang-native">${lang.native}</div>
          <div class="lang-code">${lang.code}</div>
        </div>
        <div class="check-mark">✓</div>
      `;
        card.addEventListener('click', () => {
          selected = lang.code;
          localStorage.setItem('optiplus_lang', lang.code);
          localStorage.setItem('optiplus_lang_name', lang.name);
          render();
          // Play a sample voice in the selected language
          speechSynthesis.cancel();
          const testMsg = getTestPhrase(lang.code);
          const u = new SpeechSynthesisUtterance(testMsg);
          u.lang = lang.code;
          u.rate = 0.9;
          speechSynthesis.speak(u);
        });
        grid.appendChild(card);
      });
      continueBtn.disabled = !selected;
    }
    function getTestPhrase(code) {
      const phrases = {
        'en-IN': 'Language selected: English. Proceeding to eye test.',
        'hi-IN': 'bhasha chuni gayi. aankhon ki jaanch shuru ho rahi hai.',
        'te-IN': 'bhasha empika cheyabadindi. kanti pariksha prarambhamavutundi.',
        'ta-IN': 'mozhi therndhedutthapattadhu. kan parisothanai thodangugiradhu.',
        'bn-IN': 'bhasha nirbachito. chokher porikkha shuru hochhe.',
        'mr-IN': 'bhasha nivadli. dolyanchi tapasni suru hot aahe.'

      };
      return phrases[code] || phrases['en-IN'];
    }

    function speakLanguage(lang) {
      fetch('/speak', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          text: getTestPhrase(lang),  // ✅ use the correct function
          lang: lang
        })
      })
        .then(res => res.json())
        .then(data => {
          if (data.audio_url) {
            const audio = new Audio(data.audio_url);
            audio.play();
          } else {
            console.error("Speech synthesis error:", data.error);
          }
        });
    }

    continueBtn.addEventListener('click', () => {
      if (!selected) return;
      window.location.href = "../index.html";
    });
    render();
  </script>
</body>

</html>
